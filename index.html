<!DOCTYPE html>
<html>

<head>
  <title>MetaMask Web3 Bridge</title>
</head>

<body>

  <h2>MetaMask Web3 Bridge</h2>

  <button onclick="handleConnect()">Connect Wallet</button>
  <button id="returnBtn" style="display:none;" onclick="goBack()">
    Return to App
  </button>

  <p id="status">Status: Not Connected</p>

  <script>
    let userAddress = "";

    async function handleConnect() {
      // ✅ Case 1: Already inside MetaMask
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({
            method: "eth_requestAccounts",
          });

          userAddress = accounts[0];

          document.getElementById("status").innerText =
            "Connected: " + userAddress;

          // 🔥 Send back to app
          document.getElementById("returnBtn").style.display = "block";

        } catch (err) {
          console.error(err);
        }

      } else {
        // ❌ Not inside MetaMask → redirect
        const url = window.location.href;

        const metamaskUrl =
          "https://metamask.app.link/dapp/" +
          url.replace(/^https?:\/\//, "");

        // 🔥 This MUST be inside click event
        window.location.href = metamaskUrl;
      }
    }
    function goBack() {
      window.location.href =
        `myapp://wallet?address=${userAddress}`;
    }
  </script>

</body>

</html>
